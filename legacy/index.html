<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardDay · 旧版页面备份</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="page">
        <section class="hero card-shell">
            <div>
                <p class="eyebrow">CCDay</p>
                <h1>旧版页面备份</h1>
                <p class="subtitle">管理账单日、还款规则，并快速查看下一次账单日和预计还款日。</p>
            </div>
            <div class="hero-actions">
                <el-button plain @click="resetForm">清空表单</el-button>
            </div>
        </section>

        <section class="card-shell form-shell">
            <div class="section-head">
                <h2>{{ isEditing ? '编辑信用卡' : '添加信用卡' }}</h2>
                <p>支持宽限期模式和固定还款日模式。</p>
            </div>

            <el-form :model="cardForm" label-width="110px" class="card-form">
                <div class="form-grid">
                    <el-form-item label="持卡人">
                        <el-input v-model.trim="cardForm.name" placeholder="如：老K"></el-input>
                    </el-form-item>

                    <el-form-item label="发卡银行">
                        <el-select v-model="cardForm.bank" placeholder="请选择银行" filterable>
                            <el-option
                                v-for="bankName in banks"
                                :key="bankName"
                                :label="bankName"
                                :value="bankName">
                            </el-option>
                        </el-select>
                    </el-form-item>

                    <el-form-item label="账单日">
                        <el-input-number v-model="cardForm.billDay" :min="1" :max="31" />
                    </el-form-item>

                    <el-form-item label="还款模式">
                        <el-select v-model="cardForm.billMode" @change="resetAdditionalFields" placeholder="请选择模式">
                            <el-option label="宽限期模式" value="grace"></el-option>
                            <el-option label="固定还款日模式" value="fixed"></el-option>
                        </el-select>
                    </el-form-item>

                    <el-form-item v-if="cardForm.billMode === 'grace'" label="宽限期">
                        <el-input-number v-model="cardForm.gracePeriod" :min="0" :max="30" />
                    </el-form-item>

                    <el-form-item v-if="cardForm.billMode === 'fixed'" label="固定还款日">
                        <el-input-number v-model="cardForm.fixedRepaymentDay" :min="1" :max="28" />
                    </el-form-item>

                    <el-form-item label="账单日消费">
                        <el-select v-model="cardForm.billCycle">
                            <el-option label="算本期" value="current"></el-option>
                            <el-option label="算下期" value="next"></el-option>
                        </el-select>
                    </el-form-item>
                </div>

                <el-form-item>
                    <div class="action-row">
                        <el-button type="primary" @click="submitCard">{{ isEditing ? '保存修改' : '添加信用卡' }}</el-button>
                        <el-button v-if="isEditing" @click="cancelEdit">取消编辑</el-button>
                    </div>
                </el-form-item>
            </el-form>
        </section>

        <section class="card-shell table-shell">
            <div class="section-head section-head-inline">
                <div>
                    <h2>信用卡列表</h2>
                    <p>共 {{ cards.length }} 张卡</p>
                </div>
            </div>

            <el-empty v-if="!cards.length" description="还没有添加信用卡"></el-empty>

            <el-table v-else :data="cardSummaries" border stripe>
                <el-table-column prop="name" label="持卡人" min-width="100"></el-table-column>
                <el-table-column prop="bank" label="发卡银行" min-width="120"></el-table-column>
                <el-table-column prop="billDay" label="账单日" width="90"></el-table-column>
                <el-table-column label="还款规则" min-width="150">
                    <template #default="scope">
                        {{ scope.row.billModeLabel }}
                    </template>
                </el-table-column>
                <el-table-column label="下次账单日" min-width="120">
                    <template #default="scope">{{ scope.row.nextBillDate }}</template>
                </el-table-column>
                <el-table-column label="预计还款日" min-width="120">
                    <template #default="scope">{{ scope.row.nextRepaymentDate }}</template>
                </el-table-column>
                <el-table-column label="操作" width="180" fixed="right">
                    <template #default="scope">
                        <el-button type="primary" size="small" @click="startEdit(scope.$index)">编辑</el-button>
                        <el-button type="danger" size="small" @click="deleteCard(scope.$index)">删除</el-button>
                    </template>
                </el-table-column>
            </el-table>
        </section>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="app.js"></script>
</body>
</html>
